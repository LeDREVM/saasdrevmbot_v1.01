version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: goldyxrodgers-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drevmbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drevmbot_password}
      POSTGRES_DB: ${POSTGRES_DB:-drevmbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goldyxrodgers-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drevmbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: goldyxrodgers-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - goldyxrodgers-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (depuis Docker Hub)
  backend:
    image: ledrevm/goldyxrodgersbot:backend-latest
    container_name: goldyxrodgers-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drevmbot}:${POSTGRES_PASSWORD:-drevmbot_password}@postgres:5432/${POSTGRES_DB:-drevmbot}
      REDIS_URL: redis://redis:6379/0
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-https://ledream.kflw.io}
      NEXTCLOUD_SHARE_FOLDER: ${NEXTCLOUD_SHARE_FOLDER:-/f/33416}
      NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - goldyxrodgers-network
    restart: unless-stopped

  # Frontend (depuis Docker Hub)
  frontend:
    image: ledrevm/goldyxrodgersbot:frontend-latest
    container_name: goldyxrodgers-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - goldyxrodgers-network
    restart: unless-stopped

  # Celery Worker (pour alertes automatiques)
  celery-worker:
    image: ledrevm/goldyxrodgersbot:backend-latest
    container_name: goldyxrodgers-celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drevmbot}:${POSTGRES_PASSWORD:-drevmbot_password}@postgres:5432/${POSTGRES_DB:-drevmbot}
      REDIS_URL: redis://redis:6379/0
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-https://ledream.kflw.io}
      NEXTCLOUD_SHARE_FOLDER: ${NEXTCLOUD_SHARE_FOLDER:-/f/33416}
      NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD}
    depends_on:
      - postgres
      - redis
    networks:
      - goldyxrodgers-network
    command: celery -A app.workers.alert_worker worker --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  goldyxrodgers-network:
    driver: bridge
