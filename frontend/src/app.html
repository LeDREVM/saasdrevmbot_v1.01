<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>SaaS DrevmBot</title>
		%sveltekit.head%
		<style>
			/* Basic CSS reset and font improvements */
			html, body {
				height: 100%;
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
					Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
				background: #f9fafb;
				color: #222;
			}
			*, *::before, *::after { box-sizing: inherit; }

			body[data-sveltekit-preload-data] {
				min-height: 100vh;
			}

			#sveltekit-body-root, [data-sveltekit-preload-data] > div {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- For correct stacking context and layout, avoid "display: contents" here -->
		<div id="sveltekit-body-root">%sveltekit.body%</div>
	</body>
</html>
