<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#070b16" />
		<title>SaaS DrevmBot</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
		<style>
			/* Basic CSS reset and font improvements */
			html, body {
				height: 100%;
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
					Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
				background: #070b16;
				color: #e8edf6;
			}
			*, *::before, *::after { box-sizing: inherit; }

			body[data-sveltekit-preload-data] {
				min-height: 100vh;
			}

			#sveltekit-body-root, [data-sveltekit-preload-data] > div {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- For correct stacking context and layout, avoid "display: contents" here -->
		<div id="sveltekit-body-root">%sveltekit.body%</div>
	</body>
</html>
